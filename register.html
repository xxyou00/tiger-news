<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - MapNews</title>
    <link rel="stylesheet" href="src/css/styles.css" />
    <link rel="stylesheet" href="src/css/reset.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="login-container">
        <div class="login-cont">
            <form class="login-form" id="loginForm">
                <h2 style="text-align: center; margin-bottom: 2rem;">Регистрация в MapNews</h2>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="name">Имя</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Регистрация</button>
                <div class="login-links">   
                    <a href="/" class="login-link">Продолжить без входа</a>
                    <a href="/login.html" class="login-link">Войти</a>
                </div>
                <div class="error-message" id="errorMessage">
                    
                </div>
            </form>
            <img src="./src/images/icons/logo.svg" alt="logo" class="logo-login">
            
        </div>
    </div>


    <script type="module">
        import { AuthManager } from './src/api/auth.js';
    
        const auth = new AuthManager();
        
        if (auth.isLoggedIn()) {
            window.location.href = '/';
        }
    
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
    
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
    
            const success = await auth.register(email, password, name);
            
            if (success) {
                window.location.href = '/';
            } else {
                errorMessage.textContent = 'Ошибка при регистрации. Возможно, такой email уже существует.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
